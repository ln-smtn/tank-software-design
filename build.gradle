import org.apache.tools.ant.taskdefs.condition.Os

plugins {
    id 'application'
    id 'java'
}

apply from: 'versions.gradle'

group 'ru.mipt.bit'
version '1.0-SNAPSHOT'

application {
    // Gradle 8+ использует set() для mainClass
    mainClass.set('ru.mipt.bit.platformer.GameDesktopLauncher')

    // macOS требует специальный JVM аргумент
    if (Os.isFamily(Os.FAMILY_MAC)) {
        applicationDefaultJvmArgs = ['-XstartOnFirstThread']
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation deps.gdx.gdx
    implementation deps.gdx.backend_lwjgl3
    implementation deps.gdx.platform_desktop
    // для тестов
    testImplementation "org.junit.jupiter:junit-jupiter-api:5.10.0"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:5.10.0"
}
test {
    useJUnitPlatform()
    // Включаем подробный вывод результатов тестов
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }
}
// Явно укажем Java 8 (совместимо с лямбдами)
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}


